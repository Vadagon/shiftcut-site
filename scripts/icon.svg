<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop stop-color="#151517"/>
      <stop offset="1" stop-color="#0a0a0b"/>
    </linearGradient>
    <linearGradient id="amber" x1="200" y1="96" x2="416" y2="312" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ff8f3d"/>
      <stop offset="1" stop-color="#ff7a1a"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="18" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Rounded-square app background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <rect x="1" y="1" width="510" height="510" rx="111" stroke="#ffffff" stroke-opacity="0.06" stroke-width="2"/>

  <!-- Back frame (the "shift") -->
  <rect x="112" y="196" width="176" height="188" rx="40" stroke="#6f6f76" stroke-width="22"/>

  <!-- Front frame, filled amber -->
  <g filter="url(#glow)">
    <rect x="208" y="128" width="192" height="192" rx="44" fill="url(#amber)"/>
  </g>

  <!-- The "cut" — diagonal slice through the front frame -->
  <path d="M300 168 L260 280" stroke="#0a0a0b" stroke-width="24" stroke-linecap="round"/>
</svg>
